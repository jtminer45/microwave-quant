services:
  - type: web
    name: longon-capital-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: USERS_DB_PATH
        value: /var/data/users.db
    disk:
      name: longon-capital-user-data
      mountPath: /var/data
      sizeGB: 1
